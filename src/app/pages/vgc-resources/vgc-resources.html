<section class="resources-page">
  <header class="page-header">
    <h1>VGC Resources</h1>
    <p>Shortlist of tools and websites for VGC.</p>
  </header>

  @for (category of categories; track category.title) {
    <div class="category">
      <h2>{{ category.title }}</h2>
      <div class="resource-grid">
        @for (resource of category.resources; track resource.name) {
          <a class="resource-card" [href]="resource.url" target="_blank" rel="noopener noreferrer">
            <span class="resource-name">{{ resource.name }}</span>
            <span class="resource-desc">{{ resource.description }}</span>
            <span class="resource-link">
              Visit
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
            </span>
          </a>
        }
      </div>
    </div>
  }
</section>

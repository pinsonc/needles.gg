<section class="blog-page">
  <header class="page-header">
    <h1>Blog</h1>
    <p>Thoughts, team reports, and tournament recaps.</p>
  </header>

  <div class="entries">
    @for (entry of entries; track entry.slug) {
      <a class="entry-card" [routerLink]="['/blog', entry.slug]">
        <div class="entry-meta">
          <time>{{ entry.date }}</time>
          <div class="tags">
            @for (tag of entry.tags; track tag) {
              <span class="tag">{{ tag }}</span>
            }
          </div>
        </div>
        <h2>{{ entry.title }}</h2>
        <p>{{ entry.summary }}</p>
      </a>
    }
  </div>
</section>
